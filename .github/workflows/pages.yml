name: Deploy static site to GitHub Pages

on:
  push:
    branches:
      - main
      - ui/react-vite-mui-trial
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/ui/react-vite-mui-trial')
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        if: github.ref == 'refs/heads/ui/react-vite-mui-trial'
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build React app
        if: github.ref == 'refs/heads/ui/react-vite-mui-trial'
        working-directory: ./web
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi
          npm run build

      - name: Publish React app under /react
        if: github.ref == 'refs/heads/ui/react-vite-mui-trial'
        run: |
          mkdir -p react
          cp -r web/dist/* react/

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
